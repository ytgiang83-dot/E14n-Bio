<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E14n - Trung Tâm Điều Hành Ôn Tập</title>
    <style>
        :root {
            --primary-glow: #a855f7;
            --secondary-glow: #3b82f6;
            --card-bg: rgba(10, 10, 30, 0.4);
            --border-color: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --accent-color: #c084fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #020012;
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            cursor: none;
        }

        /* NEBULA BACKGROUND */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: -2;
            opacity: 0.3;
            animation: nebula-drift 20s ease-in-out infinite alternate;
        }
        .nebula-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.5) 0%, transparent 70%);
            top: -200px;
            left: -100px;
        }
        .nebula-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.5) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation-delay: -10s;
        }
        .nebula-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes nebula-drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -30px) scale(1.2); }
        }

        .nebula-wrapper {
            position: fixed;
            pointer-events: none;
            z-index: -2;
        }
        /* Wrappers sẽ được JS gán translate để parallax, không dùng animation của nebula nữa khi parallax active? 
           Ta vẫn giữ animation drift nhưng để parallax hoạt động ta sẽ ghi đè transform của nebula nên drift sẽ tạm dừng. 
           Chấp nhận. */
        
        /* SPACE CANVAS (WARP SPEED) */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* AURA CANVAS (CURSOR SPARKLES) - chỉ PC */
        #aura-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9995;
            display: none; /* ẩn mặc định, JS bật nếu PC */
        }

        /* BURST CANVAS (TOUCH BURST) - chỉ Mobile */
        #burst-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9996;
            display: none;
        }

        /* WELCOME MESSAGE */
        #welcome-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 25px;
            color: #e9d5ff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            animation: welcomeFade 3s ease-in-out forwards;
        }

        @keyframes welcomeFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        /* CUSTOM CURSOR CHO PC */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            mix-blend-mode: difference;
        }

        .cursor-follower {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.25s ease;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .cursor.expand {
            transform: scale(1.8);
            background: rgba(192, 132, 252, 0.1);
        }

        /* MOUSE GLOW EFFECT */
        .mouse-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .mouse-glow.active {
            opacity: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeIn 1s ease-out;
            transition: transform 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            transform-style: preserve-3d;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-section {
            position: relative;
            transform-style: preserve-3d;
        }

        .profile-section img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 15px;
            box-shadow: 0 0 25px var(--accent-color);
            object-fit: cover;
            transition: all 0.3s ease;
            transform: translateZ(50px);
        }

        .profile-section img:hover {
            transform: translateZ(80px) scale(1.1) rotate(5deg);
            box-shadow: 0 0 40px var(--accent-color), 0 0 80px rgba(168, 85, 247, 0.3);
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #e9d5ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(30px);
            transition: all 0.3s ease;
        }

        h1:hover {
            letter-spacing: 3px;
            transform: translateZ(50px);
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: translateZ(20px);
        }

        #subject-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 310px;
            overflow-y: auto;
            padding-right: 10px;
            scroll-behavior: smooth;
        }

        .btn {
            flex-shrink: 0;
            min-height: 65px;
            position: relative;
            background: rgba(30, 30, 60, 0.6);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 15px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .btn:hover {
            background: rgba(60, 40, 100, 0.5);
            border-color: var(--accent-color);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.3), 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn.magnetic {
            transform: translate(var(--tx, 0), var(--ty, 0)) translateZ(30px) scale(1.05);
        }

        .btn::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: -100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }

        .btn::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow), var(--accent-color));
            border-radius: 15px;
            opacity: 0;
            filter: blur(10px);
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .btn:hover::before {
            opacity: 0.7;
            animation: rotate-glow 3s linear infinite;
        }

        @keyframes rotate-glow {
            0% { filter: blur(10px) hue-rotate(0deg); }
            100% { filter: blur(10px) hue-rotate(360deg); }
        }

        .btn:active {
            transform: scale(0.96);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        #subject-list::-webkit-scrollbar {
            width: 5px;
        }

        #subject-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #subject-list::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .copyright {
            margin-top: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transform: translateZ(10px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .profile-section img {
            animation: float 3s ease-in-out infinite;
        }

        @media (max-width: 768px) {
            body {
                cursor: auto;
            }
            .cursor, .cursor-follower {
                display: none;
            }
            #aura-canvas {
                display: none !important; /* đảm bảo ẩn */
            }
            /* Cho phép burst canvas hiển thị thông qua JS */
        }
    </style>
</head>
<body>
    <!-- NEBULA BACKGROUND (có id để JS parallax) -->
    <div class="nebula nebula-1" id="nebula1"></div>
    <div class="nebula nebula-2" id="nebula2"></div>
    <div class="nebula nebula-3" id="nebula3"></div>

    <!-- SPACE CANVAS (WARP SPEED STARS) -->
    <canvas id="space-canvas"></canvas>

    <!-- BURST CANVAS (Mobile touch burst) -->
    <canvas id="burst-canvas"></canvas>

    <!-- AURA CANVAS (PC cursor sparkles) -->
    <canvas id="aura-canvas"></canvas>

    <!-- MOUSE GLOW -->
    <div class="mouse-glow" id="mouseGlow"></div>

    <!-- CUSTOM CURSOR (PC only) -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <div class="container" id="main-card">
        <div class="profile-section">
            <img src="my-avatar.gif" alt="Avatar">
            <h1>E14n Bio</h1>
            <div class="subtitle" id="subtitle">Hệ Thống Ôn Tập Trực Tuyến</div>
        </div>

        <div id="subject-list"></div>

        <div class="copyright">
            BẢN QUYỀN THUỘC VỀ E14n
        </div>
    </div>

    <script>
        const SUBJECT_DATA = [
            { name: "📜 ÔN TẬP LỊCH SỬ", link: "https://lichsu.ytgiang83.workers.dev/" },
            { name: "🇬🇧 ÔN TẬP TIẾNG ANH", link: "https://tienganh.ytgiang83.workers.dev/" }
        ];

        const listContainer = document.getElementById('subject-list');
        const card = document.getElementById('main-card');
        const cursor = document.getElementById('cursor');
        const cursorFollower = document.getElementById('cursorFollower');
        const mouseGlow = document.getElementById('mouseGlow');
        const subtitleElement = document.getElementById('subtitle');

        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // =============================================
        // 1. TẠO CÁC NÚT BẤM
        // =============================================
        SUBJECT_DATA.forEach(sub => {
            const a = document.createElement('a');
            a.href = sub.link;
            a.className = 'btn';
            a.innerText = sub.name;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            listContainer.appendChild(a);
        });

        // =============================================
        // 2. SPACE WARP SPEED BACKGROUND (Canvas)
        // =============================================
        const spaceCanvas = document.getElementById('space-canvas');
        const spaceCtx = spaceCanvas.getContext('2d');
        let spaceW, spaceH, centerX, centerY;
        const stars = [];
        const STAR_COUNT = 250;

        function resizeSpaceCanvas() {
            spaceW = spaceCanvas.width = window.innerWidth;
            spaceH = spaceCanvas.height = window.innerHeight;
            centerX = spaceW / 2;
            centerY = spaceH / 2;
        }
        window.addEventListener('resize', resizeSpaceCanvas);
        resizeSpaceCanvas();

        class WarpStar {
            constructor() {
                this.reset(true);
            }
            reset(initial = false) {
                const angle = Math.random() * Math.PI * 2;
                const maxDist = Math.max(spaceW, spaceH) * 0.7;
                this.dist = initial ? Math.random() * maxDist : 10 + Math.random() * 40;
                this.angle = angle;
                this.z = Math.random() * 0.9 + 0.1;
                this.speed = (0.3 + this.z * 2.5);
                this.size = (0.3 + this.z * 2.2);
                this.opacity = 0.3 + this.z * 0.7;
                const colors = ['#ffffff', '#e9d5ff', '#c4b5fd', '#a5f0fc', '#c084fc'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.dist += this.speed;
                const maxDist = Math.max(spaceW, spaceH) * 0.9;
                if (this.dist > maxDist) {
                    this.dist = 5 + Math.random() * 30;
                    this.angle = Math.random() * Math.PI * 2;
                }
            }
            draw(ctx) {
                const x = centerX + Math.cos(this.angle) * this.dist;
                const y = centerY + Math.sin(this.angle) * this.dist;
                if (x < -10 || x > spaceW + 10 || y < -10 || y > spaceH + 10) return;
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.size * 4;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
                const tailLength = this.speed * 3;
                const tailX = x - Math.cos(this.angle) * tailLength;
                const tailY = y - Math.sin(this.angle) * tailLength;
                ctx.globalAlpha = this.opacity * 0.4;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size * 0.6;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(tailX, tailY);
                ctx.stroke();
                ctx.restore();
            }
        }

        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push(new WarpStar());
        }

        function animateSpace() {
            spaceCtx.clearRect(0, 0, spaceW, spaceH);
            stars.forEach(star => {
                star.update();
                star.draw(spaceCtx);
            });
            requestAnimationFrame(animateSpace);
        }
        animateSpace();

        // =============================================
        // 3. LOCAL STORAGE - WELCOME MESSAGE
        // =============================================
        const STORAGE_KEY = 'e14n_visited';
        const hasVisited = localStorage.getItem(STORAGE_KEY);

        function showWelcomeMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.id = 'welcome-msg';
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            // Tự xóa sau khi animation kết thúc (3s)
            setTimeout(() => {
                if (msgDiv.parentNode) msgDiv.parentNode.removeChild(msgDiv);
            }, 3000);
        }

        if (!hasVisited) {
            // Lần đầu tiên
            localStorage.setItem(STORAGE_KEY, '1');
            showWelcomeMessage('🌟 Chào mừng bạn đến với E14n!');
        } else {
            // Đã từng ghé thăm
            showWelcomeMessage('🚀 Welcome back, Commander!');
        }

        // =============================================
        // 4. TOUCH BURST (Mobile)
        // =============================================
        const burstCanvas = document.getElementById('burst-canvas');
        const burstCtx = burstCanvas.getContext('2d');
        let burstW, burstH;
        const burstParticles = [];
        const BURST_MAX = 200;

        function resizeBurstCanvas() {
            burstW = burstCanvas.width = window.innerWidth;
            burstH = burstCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeBurstCanvas);
        resizeBurstCanvas();

        class BurstParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.03;
                this.size = 1.5 + Math.random() * 3;
                this.color = Math.random() < 0.5 ? '#c084fc' : '#e9d5ff';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.life * 0.8;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.size * 4;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createBurst(x, y) {
            const count = 25; // số hạt mỗi lần chạm
            for (let i = 0; i < count; i++) {
                if (burstParticles.length < BURST_MAX) {
                    burstParticles.push(new BurstParticle(x, y));
                }
            }
        }

        function animateBurst() {
            burstCtx.clearRect(0, 0, burstW, burstH);
            for (let i = burstParticles.length - 1; i >= 0; i--) {
                burstParticles[i].update();
                burstParticles[i].draw(burstCtx);
                if (burstParticles[i].life <= 0) {
                    burstParticles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateBurst);
        }

        if (isMobile) {
            burstCanvas.style.display = 'block';
            resizeBurstCanvas();
            animateBurst();

            // Touch event cho burst (toàn màn hình)
            document.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                createBurst(touch.clientX, touch.clientY);
            });

            // Cũng gắn burst cho các nút (không cần riêng vì sự kiện nổi lên body, nhưng có thể chặn để tránh trùng lặp)
            // Không cần thêm code vì đã dùng document.
        }

        // =============================================
        // 5. GYROSCOPE + PARALLAX (MOBILE)
        // =============================================
        const nebula1 = document.getElementById('nebula1');
        const nebula2 = document.getElementById('nebula2');
        const nebula3 = document.getElementById('nebula3');
        // Lưu vị trí parallax hiện tại
        let currentParallaxX = 0, currentParallaxY = 0;

        function handleOrientation(event) {
            let x = event.gamma; // ngang
            let y = event.beta;  // dọc

            // Giới hạn nghiêng card
            const limit = 12;
            if (x > limit) x = limit;
            if (x < -limit) x = -limit;
            if (y > (45 + limit)) y = 45 + limit;
            if (y < (45 - limit)) y = 45 - limit;

            // Card tilt
            card.style.transform = `rotateY(${x / 1.2}deg) rotateX(${-(y - 45) / 1.2}deg)`;

            // Parallax cho các lớp nền: giá trị càng lớn -> di chuyển càng nhanh (lớp gần)
            const factor1 = 0.03; // nebula1 (xa nhất)
            const factor2 = 0.06; // nebula2
            const factor3 = 0.09; // nebula3 (gần nhất)
            const factorSpace = 0.02; // space canvas (sao nền)

            const parallaxX = x * factor3; // dùng cho lớp gần nhất, thay đổi theo ý
            const parallaxY = (y - 45) * factor3;

            // Gán translate cho từng lớp
            nebula1.style.transform = `translate(${x * factor1}px, ${(y - 45) * factor1}px)`;
            nebula2.style.transform = `translate(${x * factor2}px, ${(y - 45) * factor2}px)`;
            nebula3.style.transform = `translate(${x * factor3}px, ${(y - 45) * factor3}px)`;
            spaceCanvas.style.transform = `translate(${x * factorSpace}px, ${(y - 45) * factorSpace}px)`;

            currentParallaxX = x;
            currentParallaxY = y - 45;
        }

        function resetParallax() {
            // Trả về vị trí ban đầu (khi không có gyro hoặc khi thoát)
            nebula1.style.transform = '';
            nebula2.style.transform = '';
            nebula3.style.transform = '';
            spaceCanvas.style.transform = '';
        }

        function requestGyroPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(response => {
                            if (response === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }
        }

        if (isMobile) {
            // Khởi tạo gyro khi có tương tác đầu tiên
            document.body.addEventListener('click', () => {
                requestGyroPermission();
            }, { once: true });

            // Khi rời khỏi trang hoặc không còn gyro, reset parallax (tùy chọn)
            window.addEventListener('beforeunload', resetParallax);
        }

        // =============================================
        // 6. AURA SPARKLES (PC ONLY)
        // =============================================
        const auraCanvas = document.getElementById('aura-canvas');
        const auraCtx = auraCanvas.getContext('2d');
        let auraW, auraH;
        const sparkles = [];
        const MAX_SPARKLES = 150;
        let mouseX = 0, mouseY = 0;
        let mouseOnScreen = false;

        function resizeAuraCanvas() {
            auraW = auraCanvas.width = window.innerWidth;
            auraH = auraCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeAuraCanvas);
        resizeAuraCanvas();

        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed + 1;
                this.life = 1.0;
                this.decay = 0.006 + Math.random() * 0.02;
                this.size = 1 + Math.random() * 2.5;
                this.color = Math.random() < 0.6 ? '#c084fc' : '#e9d5ff';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.life * 0.9;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.size * 5;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnSparkles(x, y) {
            if (!mouseOnScreen) return;
            const count = 2;
            for (let i = 0; i < count; i++) {
                if (sparkles.length < MAX_SPARKLES) {
                    sparkles.push(new Sparkle(x, y));
                }
            }
        }

        function animateAura() {
            auraCtx.clearRect(0, 0, auraW, auraH);
            for (let i = sparkles.length - 1; i >= 0; i--) {
                sparkles[i].update();
                sparkles[i].draw(auraCtx);
                if (sparkles[i].life <= 0) {
                    sparkles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateAura);
        }

        if (!isMobile) {
            auraCanvas.style.display = 'block';
            animateAura();
        }

        // =============================================
        // 7. HIỆU ỨNG PC (Cursor, Tilt, Magnetic, Ripple)
        // =============================================
        if (!isMobile) {
            let cursorX = 0, cursorY = 0;
            let followerX = 0, followerY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mouseOnScreen = true;

                mouseGlow.style.left = mouseX + 'px';
                mouseGlow.style.top = mouseY + 'px';
                mouseGlow.classList.add('active');

                // Card tilt giới hạn ~12 độ
                const tiltX = ((window.innerWidth / 2 - mouseX) / 70);
                const tiltY = ((window.innerHeight / 2 - mouseY) / 70);
                card.style.transform = `rotateY(${tiltX}deg) rotateX(${tiltY}deg)`;

                spawnSparkles(mouseX, mouseY);
            });

            window.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                mouseGlow.classList.remove('active');
                mouseOnScreen = false;
            });

            function animateCursor() {
                const speed = 0.15;
                cursorX += (mouseX - cursorX) * speed;
                cursorY += (mouseY - cursorY) * speed;
                followerX += (mouseX - followerX) * speed * 0.5;
                followerY += (mouseY - followerY) * speed * 0.5;

                cursor.style.transform = `translate(${cursorX - 10}px, ${cursorY - 10}px)`;
                cursorFollower.style.transform = `translate(${followerX - 4}px, ${followerY - 4}px)`;

                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            document.querySelectorAll('.btn, .profile-section img, h1').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
            });

            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    const distance = Math.sqrt(x * x + y * y);
                    const maxDistance = 100;
                    if (distance < maxDistance) {
                        const strength = (maxDistance - distance) / maxDistance;
                        const moveX = x * strength * 0.3;
                        const moveY = y * strength * 0.3;
                        btn.style.setProperty('--tx', `${moveX}px`);
                        btn.style.setProperty('--ty', `${moveY}px`);
                        btn.classList.add('magnetic');
                    }
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.setProperty('--tx', '0');
                    btn.style.setProperty('--ty', '0');
                    btn.classList.remove('magnetic');
                });
            });

            document.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = e.clientX + 'px';
                ripple.style.top = e.clientY + 'px';
                ripple.style.width = '10px';
                ripple.style.height = '10px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        }

        // =============================================
        // 8. HIỆU ỨNG MOBILE KHÁC (Ripple, Long Press, Haptic)
        // =============================================
        if (isMobile) {
            // Ripple on touch cho các nút (giữ lại)
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.touches[0].clientX - rect.left;
                    const y = e.touches[0].clientY - rect.top;
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    ripple.style.width = '10px';
                    ripple.style.height = '10px';
                    ripple.style.position = 'absolute';
                    btn.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                });
            });

            // Haptic Feedback
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('touchstart', () => {
                    if (navigator.vibrate) navigator.vibrate(10);
                });
            });

            // Long Press Effect
            let longPressTimer;
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    longPressTimer = setTimeout(() => {
                        btn.style.transform = 'scale(1.1)';
                        if (navigator.vibrate) navigator.vibrate([20, 10, 20]);
                    }, 500);
                });
                btn.addEventListener('touchend', () => {
                    clearTimeout(longPressTimer);
                    btn.style.transform = 'scale(1)';
                });
                btn.addEventListener('touchmove', () => {
                    clearTimeout(longPressTimer);
                });
            });
        }

    </script>
</body>
</html>
